name: Build and Deploy UrlPulse

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: urlpulse-web
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: url-pulse-rg
  CONTAINER_APP: urlpulse

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test --configuration Release --no-restore

  docker-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success() # ensures job only runs if tests passed

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Docker login and Push Web
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME }} --password-stdin
        # CRITICAL: Build from root (.) so Docker can see UrlPulse.Core
        docker build -f Web/Dockerfile -t $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Deploy Container App (Web)
      run: |
        az containerapp update \
          --name $CONTAINER_APP \
          --resource-group $RESOURCE_GROUP \
          --image $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Publish Worker Function
      run: |
        dotnet publish UrlPulse.Worker/UrlPulse.Worker.csproj \
          -c Release \
          -r linux-x64 \
          --no-self-contained \
          -o ./publish-worker

    - name: Deploy Azure Function (northcentralus)
      uses: Azure/functions-action@v1
      with:
        app-name: "urlpulse-worker"
        package: ./publish-worker
        slot-name: production

    - name: Deploy Azure Function (southcentralus)
      uses: Azure/functions-action@v1
      with:
        app-name: "urlpulse-worker-southcentralus"
        package: ./publish-worker
        slot-name: production

    - name: Deploy Azure Function (westus3)
      uses: Azure/functions-action@v1
      with:
        app-name: "urlpulse-worker-westus3"
        package: ./publish-worker
        slot-name: production

    - name: Deploy Azure Function (eastus2)
      uses: Azure/functions-action@v1
      with:
        app-name: "urlpulse-worker-eastus2"
        package: ./publish-worker
        slot-name: production

    - name: Deploy Azure Function (canadacentral)
      uses: Azure/functions-action@v1
      with:
        app-name: "urlpulse-worker-canadacentral"
        package: ./publish-worker
        slot-name: production