name: Build and Deploy UrlPulse Container App

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: urlpulse
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: url-pulse-rg
  CONTAINER_APP: urlpulse

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # -------------------------
    # Checkout repo
    # -------------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -------------------------
    # Login to Azure
    # -------------------------
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: >
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    # -------------------------
    # Login to Azure Container Registry
    # -------------------------
    - name: Docker login to ACR
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login $REGISTRY \
          -u ${{ secrets.ACR_USERNAME }} --password-stdin

    # -------------------------
    # Build Docker image
    # -------------------------
    - name: Build image
      run: |
        docker build \
          -t $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -t $REGISTRY/${{ env.IMAGE_NAME }}:latest \
          .

    # -------------------------
    # Push Docker image
    # -------------------------
    - name: Push image
      run: |
        docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push $REGISTRY/${{ env.IMAGE_NAME }}:latest

    # -------------------------
    # Deploy new revision to Container App
    # -------------------------
    - name: Deploy revision
      run: |
        az containerapp update \
          --name $CONTAINER_APP \
          --resource-group $RESOURCE_GROUP \
          --image $REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # -------------------------
    # Show deployment result
    # -------------------------
    - name: Show URL
      run: |
        az containerapp show \
          --name $CONTAINER_APP \
          --resource-group $RESOURCE_GROUP \
          --query "properties.configuration.ingress.fqdn" \
          --output tsv